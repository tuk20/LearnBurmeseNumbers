<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Burmese Numerals</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Inter, Arial, sans-serif;
      background:#f6f6f6;
      color:#111;
      min-height:100vh;
    }

    button{
      font-family:inherit;
    }

    .container{
      width:min(1100px, 100%);
      margin:0 auto;
      padding:32px 24px 64px;
    }

    body.lesson-mode{
      overflow:hidden;
    }

    body.lesson-mode .container{
      width:min(1180px, 100%);
      min-height:100dvh;
      padding:12px 20px;
      display:flex;
    }

    .hero{
      text-align:center;
      margin-bottom:24px;
    }

    .hero h1{
      font-size:clamp(36px, 7vw, 56px);
      margin-bottom:16px;
      font-weight:800;
      letter-spacing:-1.5px;
    }

    .hero p{
      color:#666;
      font-size:clamp(16px, 2.5vw, 18px);
      line-height:1.6;
      max-width:760px;
      margin:0 auto;
    }

    .home-view{
      display:block;
    }

    .digit-strip{
      background:white;
      border-radius:24px;
      padding:24px;
      border:1px solid #e8e8e8;
      margin:0 0 32px;
    }

    .digit-strip h2{
      text-align:center;
      font-size:20px;
      margin-bottom:20px;
    }

    .digits{
      display:grid;
      grid-template-columns:repeat(10, minmax(72px, 1fr));
      gap:14px;
    }

    .digit-card{
      text-align:center;
      background:#fafafa;
      border:1px solid #ececec;
      border-radius:18px;
      padding:14px 10px;
    }

    .digit-card .burmese{
      font-size:clamp(34px, 5vw, 44px);
      line-height:1;
      margin-bottom:8px;
      font-weight:700;
    }

    .digit-card .english{
      color:#555;
      font-size:14px;
      margin-bottom:10px;
    }

    .digit-audio-btn{
      border:none;
      background:#111;
      color:white;
      width:36px;
      height:36px;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .top-nav{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:32px;
    }

    .lesson-top-nav{
      flex:0 0 auto;
      background:rgba(246,246,246,.95);
      backdrop-filter:blur(12px);
      padding:0 0 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .lesson-levels{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .level-btn,
    .home-btn{
      border:none;
      background:white;
      padding:12px 16px;
      border-radius:16px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
      border:1px solid #e2e2e2;
      min-height:42px;
    }

    .level-btn:hover:not(.locked),
    .home-btn:hover{
      transform:translateY(-2px);
      border-color:#111;
    }

    .level-btn.active{
      background:#111;
      color:white;
      border-color:#111;
    }

    .level-btn.locked{
      opacity:.45;
      cursor:not-allowed;
    }

    .home-btn{
      white-space:nowrap;
    }

    .home-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:24px;
    }

    .home-card{
      background:white;
      border:1px solid #e7e7e7;
      border-radius:24px;
      padding:32px;
      min-height:170px;
      display:flex;
      align-items:center;
      cursor:pointer;
      transition:.2s ease;
      text-align:left;
    }

    .home-card:hover:not(.locked-home){
      transform:translateY(-3px);
      border-color:#111;
      box-shadow:0 10px 28px rgba(0,0,0,.06);
    }

    .home-card h3{
      font-size:clamp(23px, 4vw, 28px);
      margin-bottom:12px;
    }

    .home-card p{
      color:#666;
      line-height:1.6;
      font-size:17px;
    }

    .locked-home{
      opacity:.45;
      cursor:not-allowed;
    }

    .lesson-page{
      display:none;
      width:100%;
      min-height:100dvh;
    }

    body.lesson-mode .lesson-page{
      height:calc(100dvh - 24px);
      display:flex;
      flex-direction:column;
    }

    .main-card{
      background:white;
      border-radius:28px;
      padding:clamp(16px, 2.4vw, 28px);
      border:1px solid #e9e9e9;
      box-shadow:0 5px 18px rgba(0,0,0,0.03);
    }

    body.lesson-mode .main-card{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(120px, 1fr) auto auto auto auto;
      gap:12px;
      overflow:hidden;
    }

    .lesson-title{
      text-align:center;
      margin-bottom:10px;
    }

    .lesson-title h2{
      font-size:clamp(22px, 3.2vw, 31px);
      margin-bottom:6px;
    }

    .lesson-title p{
      color:#666;
      line-height:1.5;
    }

    .display-area{
      min-height:140px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      margin-bottom:0;
      background:#fafafa;
      border-radius:24px;
      padding:clamp(14px, 2.2vw, 22px);
      border:1px solid #efefef;
      text-align:center;
      overflow:auto;
    }

    .main-display{
      font-size:clamp(48px, 10vw, 88px);
      font-weight:700;
      margin-bottom:8px;
      overflow-wrap:anywhere;
    }

    .secondary-display{
      font-size:clamp(16px, 2.4vw, 20px);
      color:#444;
      line-height:1.35;
    }

    .audio-row{
      display:flex;
      justify-content:center;
      margin-bottom:0;
    }

    .audio-btn,
    .submit-btn,
    .nav-btn{
      border:none;
      background:#111;
      color:white;
      padding:12px 20px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      min-height:42px;
    }

    .interaction-area{
      margin-bottom:0;
      min-height:0;
      overflow:auto;
    }

    .interaction-area.input-practice{
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:hidden;
    }

    .input-scroll{
      min-height:0;
      overflow:auto;
      padding-bottom:4px;
    }


    .mcq-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
      gap:12px;
    }

    .option-btn{
      background:#f9f9f9;
      border:1px solid #ddd;
      border-radius:18px;
      padding:14px;
      font-size:clamp(17px, 2.6vw, 21px);
      cursor:pointer;
      transition:.2s;
      min-height:58px;
    }

    .option-btn:hover{
      border-color:#111;
      background:#f0f0f0;
    }

    .option-btn.correct{
      background:#dcfce7;
      border-color:#16a34a;
      color:#166534;
    }

    .option-btn.wrong{
      background:#fee2e2;
      border-color:#dc2626;
      color:#991b1b;
    }

    .option-btn.selected{
      background:#e5e7eb;
      border-color:#111;
      color:#111;
    }

    .option-btn:disabled{
      cursor:not-allowed;
      opacity:.75;
    }

    .input-answer{
      width:100%;
      padding:14px;
      border-radius:18px;
      border:1px solid #ddd;
      font-size:20px;
      margin-bottom:12px;
    }

    .feedback{
      margin-top:0;
      padding:12px;
      border-radius:16px;
      font-weight:700;
      text-align:center;
      display:none;
    }

    .feedback.show{
      display:block;
    }

    .feedback.correct{
      background:#dcfce7;
      color:#166534;
    }

    .feedback.wrong{
      background:#fee2e2;
      color:#991b1b;
    }

    .navigation{
      display:flex;
      justify-content:space-between;
      gap:14px;
      margin-top:0;
    }

    .nav-btn{
      flex:1;
    }

    .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .progress{
      margin-top:0;
    }

    .progress-label{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:10px;
      color:#666;
      font-size:14px;
    }

    .progress-bar{
      width:100%;
      height:12px;
      background:#e8e8e8;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:#111;
      transition:.3s ease;
    }

    .writing-note{
      margin-bottom:14px;
      color:#666;
      font-size:14px;
    }

    .digit-picker{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:10px;
      margin:0 0 12px;
    }

    .digit-pick{
      border:none;
      background:#f1f1f1;
      border-radius:14px;
      padding:10px;
      font-size:24px;
      cursor:pointer;
    }

    .digit-pick:hover{
      background:#e9e9e9;
    }

    .score-summary{
      display:none;
      background:white;
      border:1px solid #e7e7e7;
      border-radius:24px;
      padding:24px;
      margin:0 0 32px;
      text-align:center;
    }

    .score-summary.show{
      display:block;
    }

    .score-summary h2{
      font-size:22px;
      margin-bottom:16px;
    }

    .score-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .score-card{
      background:#fafafa;
      border:1px solid #ececec;
      border-radius:18px;
      padding:18px;
    }

    .score-card h3{
      font-size:17px;
      margin-bottom:8px;
    }

    .score-card p{
      font-size:clamp(26px, 5vw, 36px);
      font-weight:800;
      color:#111;
    }

    .score-note{
      color:#666;
      line-height:1.5;
      margin-top:14px;
      font-size:15px;
    }

    @media(max-height:760px){
      body.lesson-mode .container{
        padding:8px 16px;
      }

      body.lesson-mode .lesson-page{
        height:calc(100dvh - 16px);
      }

      .lesson-top-nav{
        padding-bottom:8px;
      }

      body.lesson-mode .main-card{
        border-radius:22px;
        padding:14px;
        gap:8px;
      }

      .lesson-title p{
        display:none;
      }

      .display-area{
        min-height:110px;
      }

      .main-display{
        font-size:clamp(42px, 8vw, 70px);
      }

      .option-btn{
        min-height:50px;
        padding:10px;
      }

      .progress-label{
        margin-bottom:6px;
      }

      .progress-bar{
        height:9px;
      }
    }

    @media(max-width:850px){
      .digits{
        grid-template-columns:repeat(5, 1fr);
      }

      .home-grid,
      .score-grid{
        grid-template-columns:1fr;
      }

      .lesson-top-nav{
        align-items:flex-start;
        flex-direction:column;
      }

      .lesson-levels{
        justify-content:flex-start;
      }
    }

    @media(max-width:520px){
      .container{
        padding:24px 16px 48px;
      }

      .digits{
        grid-template-columns:repeat(2, 1fr);
      }

      .top-nav,
      .lesson-levels{
        display:grid;
        grid-template-columns:repeat(2, 1fr);
        width:100%;
      }

      .level-btn,
      .home-btn{
        width:100%;
        padding:12px;
      }

      .digit-picker{
        grid-template-columns:repeat(2, 1fr);
      }

      .navigation{
        gap:10px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section id="homeView" class="home-view" aria-label="Home screen">
      <div class="hero">
        <h1>Learn Burmese Numerals</h1>
        <p>
          Learn Burmese numerals through progressive levels focused on recognition,
          pronunciation, translation, writing, and arithmetic problem-solving.
        </p>
      </div>

      <section class="digit-strip" aria-label="Burmese digits 0 through 9">
        <h2>Burmese Digits 0–9</h2>
        <div id="homeDigits" class="digits"></div>
      </section>

      <nav id="homeLevelNav" class="top-nav" aria-label="Home level selection"></nav>

      <section id="scoreSummary" class="score-summary" aria-label="Pre-test and final quiz score summary">
        <h2>Learning Results</h2>
        <div class="score-grid">
          <div class="score-card">
            <h3>Pre-Test Score</h3>
            <p id="preTestScoreText">0 / 0</p>
          </div>
          <div class="score-card">
            <h3>Final Quiz Score</h3>
            <p id="finalQuizScoreText">0 / 0</p>
          </div>
        </div>
        <p id="scoreComparisonText" class="score-note"></p>
      </section>

      <section class="home-grid" aria-label="Course levels">
        <button class="home-card" type="button" onclick="startLesson(0)">
          <span>
            <h3>Pre-Test</h3>
            <p>Complete this short quiz before Level 1 so your starting knowledge can be compared with your final results.</p>
          </span>
        </button>

        <button id="homeCard1" class="home-card locked-home" type="button" disabled>
          <span>
            <h3>Level 1: Introduction</h3>
            <p>Unlock after the Pre-Test. Start with visual recognition, English digit matching, and pronunciation for Burmese digits 0–9.</p>
          </span>
        </button>

        <button id="homeCard2" class="home-card locked-home" type="button" disabled>
          <span>
            <h3>Level 2: Mapping and Understanding</h3>
            <p>Unlock after Level 1. Match Burmese digits with English digits and multi-digit numbers.</p>
          </span>
        </button>

        <button id="homeCard3" class="home-card locked-home" type="button" disabled>
          <span>
            <h3>Level 3: Application</h3>
            <p>Unlock after Level 2. Translate, read, and write Burmese numerals through practice.</p>
          </span>
        </button>

        <button id="homeCard4" class="home-card locked-home" type="button" disabled>
          <span>
            <h3>Level 4: Arithmetic Use</h3>
            <p>Unlock after Level 3. Solve addition and subtraction using Burmese numerals.</p>
          </span>
        </button>

        <button id="homeCard5" class="home-card locked-home" type="button" disabled>
          <span>
            <h3>Final Quiz</h3>
            <p>Unlock after Levels 1–4. Complete the same quiz as the Pre-Test to compare what you learned.</p>
          </span>
        </button>
      </section>
    </section>

    <section id="lessonPage" class="lesson-page" aria-label="Lesson screen">
      <nav class="lesson-top-nav" aria-label="Lesson navigation">
        <button class="home-btn" type="button" onclick="goHome()">Home</button>
        <div id="lessonNav" class="lesson-levels"></div>
      </nav>

      <article class="main-card">
        <div class="lesson-title">
          <h2 id="lessonTitle"></h2>
          <p id="lessonSubtitle"></p>
        </div>

        <section class="display-area" aria-live="polite">
          <div id="mainDisplay" class="main-display"></div>
          <div id="secondaryDisplay" class="secondary-display"></div>
        </section>

        <div class="audio-row">
          <button class="audio-btn" type="button" onclick="playAudio()">🔊 Play pronunciation</button>
        </div>

        <section id="interactionArea" class="interaction-area"></section>
        <div id="feedback" class="feedback" role="status"></div>

        <div class="navigation">
          <button id="previousBtn" class="nav-btn" type="button" onclick="previousQuestion()">Previous</button>
          <button id="nextBtn" class="nav-btn" type="button" onclick="nextQuestion()">Next</button>
        </div>

        <div class="progress">
          <div class="progress-label">
            <span id="progressLabel">Question progress</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const digitReference = [
      { burmese:"၀", english:"0", word:"Zero", audio:"tho nya" },
      { burmese:"၁", english:"1", word:"One", audio:"teet" },
      { burmese:"၂", english:"2", word:"Two", audio:"hnit" },
      { burmese:"၃", english:"3", word:"Three", audio:"thone" },
      { burmese:"၄", english:"4", word:"Four", audio:"lay" },
      { burmese:"၅", english:"5", word:"Five", audio:"nga" },
      { burmese:"၆", english:"6", word:"Six", audio:"chauk" },
      { burmese:"၇", english:"7", word:"Seven", audio:"khun hnit" },
      { burmese:"၈", english:"8", word:"Eight", audio:"shit" },
      { burmese:"၉", english:"9", word:"Nine", audio:"koe" }
    ];

    const levels = {
      0:{
        title:"Pre-Test",
        subtitle:"Answer these questions before Level 1 so your starting knowledge can be compared with your final quiz results.",
        type:"mcq",
        questions:[
          { display:"Which Burmese digit represents the English number 5?", sub:"Choose the correct answer.", audio:"five", options:["၄","၆","၅","၇"], answer:"၅" },
          { display:"What English number is represented by the Burmese digit ၃?", sub:"Choose the correct answer.", audio:"three", options:["2","4","5","3"], answer:"3" },
          { display:"Select the Burmese numeral that means 'Eight'.", sub:"Choose the correct answer.", audio:"eight", options:["၈","၆","၇","၁"], answer:"၈" },
          { display:"What is the correct pronunciation for the Burmese digit ၄?", sub:"Choose the correct answer.", audio:"lay", options:["Hnit","Thone","Lay","Koe"], answer:"Lay" },
          { display:"Which Burmese digit has a pronunciation closest to 'Chauk'?", sub:"Choose the correct answer.", audio:"chauk", options:["၅","၇","၆","၈"], answer:"၆" },
          { display:"Which Burmese numeral sequence correctly translates the English number 21?", sub:"Choose the correct answer.", audio:"twenty one", options:["၁၂","၂၁","၂၀","၂၂"], answer:"၂၁" },
          { display:"The Burmese numeral sequence ၄၈ translates to which English number?", sub:"Choose the correct answer.", audio:"forty eight", options:["48","84","408","12"], answer:"48" },
          { display:"Solve: ၅ + ၄ = ?", sub:"Select the answer in Burmese numerals.", audio:"nine", options:["၈","၀","၁","၉"], answer:"၉" },
          { display:"Solve: ၇ - ၃ = ?", sub:"Select the answer in Burmese numerals.", audio:"four", options:["၁၀","၃","၄","၅"], answer:"၄" }
        ]

      },
      1:{
        title:"Level 1: Introduction",
        subtitle:"Presenting and recognizing Burmese digits (0–9) through visual recognition and pronunciation.",
        type:"mcq",
        questions:[
          { display:"၀", sub:"Zero", audio:"tho nya", pronunciation:"tho nya", options:["0","1","2","3"], answer:"0" },
          { display:"၁", sub:"One", audio:"teet", pronunciation:"teet", options:["1","2","3","4"], answer:"1" },
          { display:"၂", sub:"Two", audio:"hnit", pronunciation:"hnit", options:["1","2","4","5"], answer:"2" },
          { display:"၃", sub:"Three", audio:"thone", pronunciation:"thone", options:["2","3","4","5"], answer:"3" },
          { display:"၄", sub:"Four", audio:"lay", pronunciation:"lay", options:["4","5","6","7"], answer:"4" },
          { display:"၅", sub:"Five", audio:"nga", pronunciation:"nga", options:["4","5","7","2"], answer:"5" },
          { display:"၆", sub:"Six", audio:"chauk", pronunciation:"chauk", options:["5","6","7","8"], answer:"6" },
          { display:"၇", sub:"Seven", audio:"khun hnit", pronunciation:"khun hnit", options:["5","6","7","8"], answer:"7" },
          { display:"၈", sub:"Eight", audio:"shit", pronunciation:"shit", options:["6","8","1","4"], answer:"8" },
          { display:"၉", sub:"Nine", audio:"koe", pronunciation:"koe", options:["6","8","9","4"], answer:"9" }
        ]
      },
      2:{
        title:"Level 2: Mapping and Understanding",
        subtitle:"Matching and associating Burmese digits with English digits and multi-digit numbers.",
        type:"mcq",
        questions:[
          { display:"12", sub:"Select the correct Burmese numeral sequence.", audio:"twelve", options:["၁၂","၂၁","၁၁","၂၀"], answer:"၁၂" },
          { display:"21", sub:"Select the correct Burmese numeral sequence.", audio:"twenty one", options:["၁၂","၂၁","၂၀","၂၂"], answer:"၂၁" },
          { display:"၄၈", sub:"Which English number matches this Burmese numeral sequence?", audio:"forty eight", options:["48","84","408","12"], answer:"48" },
          { display:"၆", sub:"Select the Burmese digit with the pronunciation closest to 'Chauk'.", audio:"chauk", options:["၅","၇","၆","၈"], answer:"၆" }
        ]
      },
      3:{
        title:"Level 3: Application",
        subtitle:"Translating, reading, and writing Burmese numerals through interactive exercises.",
        type:"input",
        questions:[
          { display:"4", sub:"Translate this English number into Burmese numerals.", audio:"four", answer:"၄" },
          { display:"7", sub:"Translate this English number into Burmese numerals.", audio:"seven", answer:"၇" },
          { display:"၄", sub:"Type the pronunciation for this Burmese digit.", audio:"lay", answer:"lay" },
          { display:"21", sub:"Translate this English number into Burmese numerals.", audio:"twenty one", answer:"၂၁" },
          { display:"၄၈", sub:"Translate this Burmese numeral sequence into English.", audio:"forty eight", answer:"48" }
        ]
      },
      4:{
        title:"Level 4: Arithmetic Use",
        subtitle:"Solve basic addition and subtraction problems using Burmese numerals.",
        type:"input",
        questions:[
          { display:"၁ + ၂ = ?", sub:"Enter the correct Burmese numeral answer.", audio:"three", answer:"၃" },
          { display:"၃ + ၂ = ?", sub:"Enter the correct Burmese numeral answer.", audio:"five", answer:"၅" },
          { display:"၅ + ၄ = ?", sub:"Enter the correct Burmese numeral answer.", audio:"nine", answer:"၉" },
          { display:"၇ - ၃ = ?", sub:"Enter the correct Burmese numeral answer.", audio:"four", answer:"၄" }
        ]
      },
      5:{
        title:"Final Quiz",
        subtitle:"Complete the same questions as the Pre-Test to compare your knowledge after Levels 1–4.",
        type:"mcq",
        questions:[
          { display:"Which Burmese digit represents the English number 5?", sub:"Choose the correct answer.", audio:"five", options:["၄","၆","၅","၇"], answer:"၅" },
          { display:"What English number is represented by the Burmese digit ၃?", sub:"Choose the correct answer.", audio:"three", options:["2","4","5","3"], answer:"3" },
          { display:"Select the Burmese numeral that means 'Eight'.", sub:"Choose the correct answer.", audio:"eight", options:["၈","၆","၇","၁"], answer:"၈" },
          { display:"What is the correct pronunciation for the Burmese digit ၄?", sub:"Choose the correct answer.", audio:"lay", options:["Hnit","Thone","Lay","Koe"], answer:"Lay" },
          { display:"Which Burmese digit has a pronunciation closest to 'Chauk'?", sub:"Choose the correct answer.", audio:"chauk", options:["၅","၇","၆","၈"], answer:"၆" },
          { display:"Which Burmese numeral sequence correctly translates the English number 21?", sub:"Choose the correct answer.", audio:"twenty one", options:["၁၂","၂၁","၂၀","၂၂"], answer:"၂၁" },
          { display:"The Burmese numeral sequence ၄၈ translates to which English number?", sub:"Choose the correct answer.", audio:"forty eight", options:["48","84","408","12"], answer:"48" },
          { display:"Solve: ၅ + ၄ = ?", sub:"Select the answer in Burmese numerals.", audio:"nine", options:["၈","၀","၁","၉"], answer:"၉" },
          { display:"Solve: ၇ - ၃ = ?", sub:"Select the answer in Burmese numerals.", audio:"four", options:["၁၀","၃","၄","၅"], answer:"၄" }
        ]
      }
    };

    let currentLevel = 0;
    let currentQuestion = 0;
    let completedPreTest = false;
    let completedFinalQuiz = false;
    let preTestScore = null;
    let finalQuizScore = null;
    const testAnswers = { 0:{}, 5:{} };
    const completedLevels = { 1:false, 2:false, 3:false, 4:false };

    function speakText(text){
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.85;
      speechSynthesis.speak(utterance);
    }

    function renderHomeDigits(){
      const homeDigits = document.getElementById("homeDigits");
      homeDigits.innerHTML = "";

      digitReference.forEach(digit => {
        const card = document.createElement("div");
        card.className = "digit-card";
        card.innerHTML = `
          <div class="burmese">${digit.burmese}</div>
          <div class="english">${digit.english} · ${digit.word}</div>
          <button class="digit-audio-btn" type="button" aria-label="Play pronunciation for ${digit.word}">🔊</button>
        `;
        card.querySelector("button").onclick = () => speakText(digit.audio);
        homeDigits.appendChild(card);
      });
    }

    function isLevelUnlocked(level){
      if(level === 0) return true;
      if(level === 1) return completedPreTest;
      return completedLevels[level - 1] || (level === 5 && isQuizUnlocked());
    }

    function getLevelLabel(level){
      if(level === 0) return "Pre-Test";
      if(level === 5) return "Final Quiz";
      return `Level ${level}`;
    }

    function renderHomeLevelNav(){
      const homeLevelNav = document.getElementById("homeLevelNav");
      homeLevelNav.innerHTML = "";

      for(let i = 0; i <= 5; i++){
        const isUnlocked = isLevelUnlocked(i);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "level-btn";
        btn.textContent = isUnlocked ? getLevelLabel(i) : `${getLevelLabel(i)} 🔒`;

        if(!isUnlocked){
          btn.classList.add("locked");
          btn.disabled = true;
        } else {
          btn.onclick = () => startLesson(i);
        }

        homeLevelNav.appendChild(btn);
      }

      updateScoreSummary();
    }

    function renderLessonNav(){
      const lessonNav = document.getElementById("lessonNav");
      lessonNav.innerHTML = "";

      for(let i = 0; i <= 5; i++){
        const isUnlocked = isLevelUnlocked(i);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "level-btn";
        btn.textContent = isUnlocked ? getLevelLabel(i) : `${getLevelLabel(i)} 🔒`;

        if(i === currentLevel){
          btn.classList.add("active");
          btn.setAttribute("aria-current", "page");
        }

        if(!isUnlocked){
          btn.classList.add("locked");
          btn.disabled = true;
        } else {
          btn.onclick = () => switchLevel(i);
        }

        lessonNav.appendChild(btn);
      }
    }

    function renderQuestion(){
      const level = levels[currentLevel];
      const q = level.questions[currentQuestion];

      document.getElementById("lessonTitle").innerText = level.title;
      document.getElementById("lessonSubtitle").innerText = level.subtitle;
      document.getElementById("mainDisplay").innerText = q.display;
      document.getElementById("secondaryDisplay").innerHTML = `
        ${q.sub}
        ${q.pronunciation ? `<br><br><strong>Pronunciation:</strong> ${q.pronunciation}` : ""}
      `;

      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.innerText = "";

      const interactionArea = document.getElementById("interactionArea");
      interactionArea.className = "interaction-area";
      interactionArea.innerHTML = "";

      if(level.type === "mcq"){
        const grid = document.createElement("div");
        grid.className = "mcq-grid";

        q.options.forEach(option => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "option-btn";
          btn.innerText = option;

          if(testAnswers[currentLevel] && testAnswers[currentLevel][currentQuestion] === option){
            if(currentLevel === 0){
              btn.classList.add("selected");
            } else {
              btn.classList.add(option === q.answer ? "correct" : "wrong");
            }
          }

          if(currentLevel === 0 && testAnswers[0][currentQuestion]){
            btn.disabled = true;
          }

          btn.onclick = () => checkMcqAnswer(btn, option, q.answer);
          grid.appendChild(btn);
        });

        interactionArea.appendChild(grid);
      } else {
        interactionArea.classList.add("input-practice");

        const inputScroll = document.createElement("div");
        inputScroll.className = "input-scroll";

        if(currentLevel === 3 || currentLevel === 4){
          const writingHint = document.createElement("p");
          writingHint.innerHTML = "Select Burmese digits below to enter your answer.";
          writingHint.className = "writing-note";
          inputScroll.appendChild(writingHint);
        }

        const input = document.createElement("input");
        input.className = "input-answer";
        input.placeholder = "Type your answer...";
        input.id = "textAnswer";

        input.oninput = () => checkInputAnswer(input.value, q.answer, true, input);

        inputScroll.appendChild(input);

        if(currentLevel === 3 || currentLevel === 4){
          const picker = document.createElement("div");
          picker.className = "digit-picker";
          digitReference.forEach(item => {
            const digitBtn = document.createElement("button");
            digitBtn.type = "button";
            digitBtn.className = "digit-pick";
            digitBtn.innerText = item.burmese;
            digitBtn.onclick = () => {
              input.value += item.burmese;
              input.focus();
              checkInputAnswer(input.value, q.answer, true, input);
            };
            picker.appendChild(digitBtn);
          });
          inputScroll.appendChild(picker);
        }

        interactionArea.appendChild(inputScroll);
      }

      renderLessonNav();
      renderHomeLevelNav();
      updateProgress();
    }

    function checkMcqAnswer(button, selected, answer){
      const buttons = button.parentElement.querySelectorAll("button");

      if(currentLevel === 0){
        if(testAnswers[0][currentQuestion]) return;
        testAnswers[0][currentQuestion] = selected;
        buttons.forEach(btn => {
          btn.disabled = true;
          btn.classList.remove("correct", "wrong", "selected");
        });
        button.classList.add("selected");
        showFeedback("Answer recorded. Click Next to continue.", true);
        return;
      }

      buttons.forEach(btn => btn.classList.remove("correct", "wrong"));

      if(testAnswers[currentLevel]){
        testAnswers[currentLevel][currentQuestion] = selected;
      }

      if(selected === answer){
        button.classList.add("correct");
        showFeedback("Correct answer!", true);
        speakText("Correct");
      } else {
        button.classList.add("wrong");
        showFeedback("Incorrect. Try again.", false);
        speakText("Try again");
      }
    }

    function clearFeedback(){
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.innerText = "";
    }

    function checkInputAnswer(value, answer, instant = false, inputElement = null){
      const normalizedValue = value.trim().toLowerCase();
      const normalizedAnswer = String(answer).trim().toLowerCase();

      if(instant){
        const requiredLength = normalizedAnswer.length;

        if(normalizedValue.length < requiredLength){
          clearFeedback();
          if(inputElement) inputElement.dataset.lastFeedback = "";
          return;
        }
      }

      const isCorrect = normalizedValue === normalizedAnswer;
      const message = isCorrect ? "Correct answer!" : "Incorrect. Try again.";
      showFeedback(message, isCorrect);

      if(instant && inputElement){
        const feedbackKey = `${normalizedValue}|${message}`;
        if(inputElement.dataset.lastFeedback === feedbackKey) return;
        inputElement.dataset.lastFeedback = feedbackKey;
      }

      speakText(isCorrect ? "Correct" : "Try again");
    }

    function showFeedback(message, correct){
      const feedback = document.getElementById("feedback");
      feedback.innerText = message;
      feedback.className = `feedback show ${correct ? "correct" : "wrong"}`;
    }

    function calculateTestScore(levelNumber){
      const level = levels[levelNumber];
      const answers = testAnswers[levelNumber] || {};

      return level.questions.reduce((score, question, index) => {
        return score + (answers[index] === question.answer ? 1 : 0);
      }, 0);
    }

    function updateScoreSummary(){
      const scoreSummary = document.getElementById("scoreSummary");
      if(!scoreSummary) return;

      if(!completedFinalQuiz){
        scoreSummary.classList.remove("show");
        return;
      }

      const preTotal = levels[0].questions.length;
      const finalTotal = levels[5].questions.length;
      const preScore = preTestScore === null ? 0 : preTestScore;
      const finalScore = finalQuizScore === null ? 0 : finalQuizScore;
      const improvement = finalScore - preScore;

      document.getElementById("preTestScoreText").innerText = `${preScore} / ${preTotal}`;
      document.getElementById("finalQuizScoreText").innerText = `${finalScore} / ${finalTotal}`;
      document.getElementById("scoreComparisonText").innerText = improvement >= 0
        ? `Improvement: +${improvement} question${improvement === 1 ? "" : "s"} compared with the Pre-Test.`
        : `Final Quiz score was ${Math.abs(improvement)} question${Math.abs(improvement) === 1 ? "" : "s"} lower than the Pre-Test.`;

      scoreSummary.classList.add("show");
    }

    function nextQuestion(){
      const level = levels[currentLevel];

      if(currentQuestion < level.questions.length - 1){
        currentQuestion++;
        renderQuestion();
        return;
      }

      if(currentLevel === 0){
        preTestScore = calculateTestScore(0);
        completedPreTest = true;
        unlockHomeLevel(1);
        currentLevel = 1;
        currentQuestion = 0;
        renderQuestion();
        return;
      }

      if(currentLevel <= 4){
        completedLevels[currentLevel] = true;
        unlockHomeLevel(currentLevel + 1);
        unlockQuiz();

        if(currentLevel < 5){
          const nextLevel = currentLevel + 1;
          currentLevel = nextLevel;
          currentQuestion = 0;
          renderQuestion();
          return;
        }
      }

      if(currentLevel === 5){
        finalQuizScore = calculateTestScore(5);
        completedFinalQuiz = true;
        updateScoreSummary();
        showFeedback(`Final Quiz completed! Your score is ${finalQuizScore} / ${levels[5].questions.length}. Return Home to compare your Pre-Test and Final Quiz scores.`, true);
      }
    }

    function previousQuestion(){
      if(currentQuestion > 0){
        currentQuestion--;
        renderQuestion();
      }
    }

    function startLesson(level){
      if(!isLevelUnlocked(level)) return;

      document.body.classList.add("lesson-mode");
      document.getElementById("homeView").style.display = "none";
      document.getElementById("lessonPage").style.display = "flex";
      switchLevel(level);
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    function goHome(){
      document.body.classList.remove("lesson-mode");
      document.getElementById("lessonPage").style.display = "none";
      document.getElementById("homeView").style.display = "block";
      renderLessonNav();
      renderHomeLevelNav();
      updateScoreSummary();
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    function switchLevel(level){
      if(!isLevelUnlocked(level)) return;
      currentLevel = level;
      currentQuestion = 0;
      renderQuestion();
    }

    function updateProgress(){
      const level = levels[currentLevel];
      const progress = ((currentQuestion + 1) / level.questions.length) * 100;
      document.getElementById("progressFill").style.width = `${progress}%`;
      document.getElementById("progressText").innerText = `${Math.round(progress)}%`;
      document.getElementById("progressLabel").innerText = `Question ${currentQuestion + 1} of ${level.questions.length}`;

      const previousBtn = document.getElementById("previousBtn");
      const nextBtn = document.getElementById("nextBtn");
      previousBtn.disabled = currentQuestion === 0;
      nextBtn.innerText = currentQuestion === level.questions.length - 1 ? "Finish / Continue" : "Next";
    }

    function playAudio(){
      const level = levels[currentLevel];
      const q = level.questions[currentQuestion];
      speakText(q.audio);
    }

    function isQuizUnlocked(){
      return Object.values(completedLevels).every(Boolean);
    }

    function unlockHomeLevel(level){
      const card = document.getElementById(`homeCard${level}`);
      if(!card) return;
      card.classList.remove("locked-home");
      card.disabled = false;
      card.onclick = () => startLesson(level);
    }

    function unlockQuiz(){
      if(isQuizUnlocked()){
        unlockHomeLevel(5);
      }
    }

    renderHomeDigits();
    renderHomeLevelNav();
    updateScoreSummary();
  </script>
</body>
</html>
